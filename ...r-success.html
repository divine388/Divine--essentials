<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="keywords" content="spiritual ecommerce, premium wellness products, incense oils candles, mindful living, divine essentials" />
    <meta name="description" content="Order confirmation for your Divine Essentials purchase." />
    <meta name="theme-color" content="#111111" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Order Confirmed | Divine Essentials" />
    <meta property="og:description" content="Order confirmation for your Divine Essentials purchase." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1608571423902-eed4a5ad8108?auto=format,compress&fit=crop&w=1200&q=60" />
    <meta property="og:url" content="https://divine-essentials.vercel.app/order-success.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://divine-essentials.vercel.app/order-success.html" />
    <title>Order Confirmed | Divine Essentials</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell checkout-shell">
      <header class="checkout-topbar">
        <a class="brand" href="index.html">Divine Essentials</a>
        <a class="checkout-back" href="products.html">Continue Shopping</a>
      </header>

      <main class="confirmation-page">
        <section class="confirmation-card">
          <h1>Thank you. Your order is confirmed.</h1>
          <p id="confirmation-subtitle">We are preparing your package with care.</p>

          <div class="confirmation-meta">
            <p><span>Order ID</span><strong id="order-id">—</strong></p>
            <p><span>Payment ID</span><strong id="payment-id">—</strong></p>
            <p><span>Placed On</span><strong id="order-date">—</strong></p>
          </div>
        </section>

        <section class="confirmation-summary">
          <h2>Order Summary</h2>
          <div id="confirmation-items" class="checkout-items"></div>
          <p class="summary-line"><span>Subtotal</span><strong id="confirmation-subtotal">$0.00</strong></p>
          <p class="summary-line"><span>Shipping</span><strong id="confirmation-shipping">$0.00</strong></p>
          <p class="summary-line"><span>Delivery Estimate</span><strong id="confirmation-estimate">—</strong></p>
          <p class="summary-line total-line"><span>Total</span><strong id="confirmation-total">$0.00</strong></p>
                  <button id="download-invoice" class="btn btn-primary" type="button">Download Invoice (PDF)</button>
        </section>
      </main>
    </div>

    <script src="intl.js" defer></script>
    <script src="order-utils.js" defer></script>
    <script src="main.js" defer></script>
    <script src="order-success.js" defer></script>
  </body>
</html>
