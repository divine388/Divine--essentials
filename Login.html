<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="keywords" content="spiritual ecommerce, premium wellness products, incense oils candles, mindful living, divine essentials" />
    <meta name="description" content="Login to Divine Essentials account." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Login | Divine Essentials" />
    <meta property="og:description" content="Login to Divine Essentials account." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1608571423902-eed4a5ad8108?auto=format,compress&fit=crop&w=1200&q=60" />
    <meta property="og:url" content="https://divine-essentials.vercel.app/login.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://divine-essentials.vercel.app/login.html" />
    <title>Login | Divine Essentials</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell checkout-shell">
      <header class="checkout-topbar">
        <a class="brand" href="index.html">Divine Essentials</a>
        <a class="checkout-back" href="signup.html">Create Account</a>
      </header>

      <main class="auth-page">
        <section class="auth-card">
          <h1>Welcome Back</h1>
          <p>Sign in to view your orders and continue your spiritual essentials journey.</p>

          <form id="login-form" class="checkout-form">
            <label for="login-email">Email</label>
            <input id="login-email" name="email" type="email" required />

            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" required />

            <button class="btn btn-primary" type="submit">Login</button>
            <p id="auth-status" class="payment-status" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>

    <script src="auth-utils.js" defer></script>
    <script src="login.js" defer></script>
      <script src="main.js" defer></script>
  </body>
</html>
