<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Admin panel for Divine Essentials." />
    <title>Admin Panel | Divine Essentials</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell checkout-shell">
      <header class="checkout-topbar">
        <a class="brand" href="index.html">Divine Essentials</a>
        <a class="checkout-back" href="products.html">Back to Store</a>
      </header>

      <main class="admin-page">
        <section class="admin-card">
          <h1>Dashboard</h1>
          <div class="admin-stats">
            <p><span>Products</span><strong id="stat-products">0</strong></p>
            <p><span>Orders</span><strong id="stat-orders">0</strong></p>
          </div>
        </section>

        <section class="admin-card">
          <h2>Add Product</h2>
          <form id="admin-product-form" class="checkout-form">
            <label for="admin-name">Name</label>
            <input id="admin-name" name="name" type="text" required />

            <label for="admin-price">Price (USD)</label>
            <input id="admin-price" name="price" type="number" min="1" step="0.01" required />

            <label for="admin-category">Category</label>
            <select id="admin-category" name="category" required>
              <option value="wellness">Wellness</option>
              <option value="home">Home</option>
              <option value="ritual">Ritual</option>
            </select>

            <label for="admin-image">Image URL</label>
            <input id="admin-image" name="image" type="url" required />

            <button class="btn btn-primary" type="submit">Add Product</button>
            <p id="admin-status" class="payment-status" aria-live="polite"></p>
          </form>
        </section>

        <section class="admin-card">
          <h2>Manage Products</h2>
          <div id="admin-products"></div>
        </section>

        <section class="admin-card">
          <h2>Recent Orders</h2>
          <div id="admin-orders"></div>
        </section>
      </main>
    </div>

    <script src="intl.js" defer></script>
    <script src="main.js" defer></script>
    <script src="order-utils.js" defer></script>
    <script src="admin.js" defer></script>
  </body>
</html>
