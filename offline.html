<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Divine Essentials</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(180deg, #fcfcff, #f3f3f8);
        color: #17142c;
        padding: 1rem;
      }

      .offline-card {
        width: min(460px, 100%);
        border-radius: 1rem;
        border: 1px solid #e4e1ef;
        background: #ffffffee;
        padding: 1.4rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 1.6rem;
      }

      p {
        margin: 0.9rem 0 0;
        color: #6b6780;
        line-height: 1.7;
      }

      .actions {
        margin-top: 1.1rem;
        display: inline-flex;
        gap: 0.6rem;
      }

      a,
      button {
        border: 1px solid #dbd7eb;
        border-radius: 999px;
        text-decoration: none;
        padding: 0.7rem 1rem;
        font-size: 0.95rem;
        color: #17142c;
        background: #fff;
      }

      button {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="offline-card">
      <h1>You’re offline</h1>
      <p>
        Divine Essentials is still available for basic browsing. Reconnect to load fresh products,
        checkout updates, and secure payment actions.
      </p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Try Again</button>
        <a href="index.html">Go Home</a>
      </div>
    </main>
  </body>
</html>
